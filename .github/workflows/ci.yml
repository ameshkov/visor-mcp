name: CI

# Runs the full quality gate (format, lint, typecheck, tests) on every
# push to the main branch and on pull requests, so a broken change can
# never reach a release tag.
#
# On tag pushes (v*), also publishes the package to npm and creates a
# GitHub release. Publishing uses npm Trusted Publishers (OIDC) — see
# docs/configuration.md for setup instructions.

on:
  push:
    branches:
      - master
      - main
    tags:
      - 'v*'
  pull_request:

permissions:
  contents: read

# Cancel superseded runs on PRs (never on tag pushes, which drive releases).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  check:
    name: Quality gates
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run quality gates
        run: pnpm check

      - name: Build
        run: pnpm build

  publish:
    name: Publish to npm
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [check]
    runs-on: ubuntu-latest
    timeout-minutes: 15

    permissions:
      contents: write # to create the GitHub release
      id-token: write # to enable npm provenance

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Verify tag matches package version
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME#v}"
          PKG_VERSION=$(node -p "require('./package.json').version")
          echo "Tag version:   $TAG"
          echo "Package version: $PKG_VERSION"
          if [ "$TAG" != "$PKG_VERSION" ]; then
            echo "::error::Tag $TAG does not match package.json version $PKG_VERSION"
            exit 1
          fi

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      # No token needed: npm authenticates via OIDC (Trusted Publishers).
      # Provenance is generated automatically from the id-token permission.
      - name: Publish to npm
        # TODO: Uncomment after making the repo public
        # run: npm publish --provenance --access public
        run: npm publish --access public

      - name: Build npm package tarball
        run: npm pack

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body: See [CHANGELOG.md](./CHANGELOG.md) for the list of
            changes.
          draft: false
          prerelease: false
          fail_on_unmatched_files: true
          files: visor-mcp-*.tgz
